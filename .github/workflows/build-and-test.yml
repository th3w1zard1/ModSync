name: Build and Test KOTORModSync

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: "9.0.x"
  TEST_PROJECT: "src/KOTORModSync.Tests/KOTORModSync.Tests.csproj"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Provision mod-builds
        shell: pwsh
        run: |
          if (-not (Test-Path "mod-builds/.git")) {
            git clone https://github.com/th3w1zard1/mod-builds ./mod-builds
          }

      - name: Restore test project
        run: dotnet restore "${{ env.TEST_PROJECT }}"

      - name: Build test project
        run: dotnet build "${{ env.TEST_PROJECT }}" --configuration Debug --no-restore

      - name: Run shared pipeline tests
        run: dotnet test "${{ env.TEST_PROJECT }}" --no-build --filter "FullyQualifiedName~InstallCoordinatorTests"

      - name: Run CLI integration test
        run: dotnet test "${{ env.TEST_PROJECT }}" --no-build --filter "FullyQualifiedName~CliInstallIntegrationTests"

      - name: Run updater smoke tests
        run: dotnet test "${{ env.TEST_PROJECT }}" --no-build --filter "FullyQualifiedName~AutoUpdateServiceTests"

      - name: Run self-update smoke tests
        run: dotnet test "${{ env.TEST_PROJECT }}" --no-build --filter "FullyQualifiedName~SelfUpdateIntegrationTests"

      - name: Run telemetry smoke tests
        run: |
          dotnet test "${{ env.TEST_PROJECT }}" --no-build --filter "Name~ComputeSignature_SameInputs_ReturnsDeterministicLowercaseHex"
          dotnet test "${{ env.TEST_PROJECT }}" --no-build --filter "Name~SaveThenLoad_PreservesKeyConfigurationFields"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build
          path: |
            **/bin/Debug/**/*.dll
            **/bin/Debug/**/*.exe
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Dependencies
        run: dotnet restore "${{ env.TEST_PROJECT }}"

      - name: Run Security Audit
        run: dotnet list "${{ env.TEST_PROJECT }}" package --vulnerable --include-transitive
        continue-on-error: true

      - name: Check for Secrets in Code
        uses: trufflesecurity/trufflehog@v3.88.2
        with:
          extra_args: --only-verified
        continue-on-error: true
