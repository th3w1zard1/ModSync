# Release Please: manual only — opens/updates a version-bump PR. Does NOT publish GitHub Releases.
# GitHub Releases are created only via "Build and Release KOTORModSync" workflow_dispatch
# with create_github_release=true.
#
# Requires repo Settings → Actions → General:
# "Allow GitHub Actions to create and approve pull requests" when using this workflow.
name: Release Please

on:
  workflow_dispatch:
    inputs:
      create_release_pr:
        description: "Open or refresh the Release Please version-bump pull request"
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: inputs.create_release_pr
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          skip-github-release: true

      - name: Output Release Info
        if: steps.release.outputs.releases_created == 'true'
        run: |
          echo "Release Please updated release PR (no GitHub Release was created)."
          echo "Merge the PR when ready, then run Build and Release with create_github_release=true."
